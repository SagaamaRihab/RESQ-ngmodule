<!-- CONTENITORE PRINCIPALE PAGINA EVACUAZIONE -->
<div class="evacuation-wrapper">

  <!-- CARD CENTRALE CON ANIMAZIONE -->
  <div class="evacuation-card fade-in">


    <!-- ================= HEADER ================= -->
    <div class="card-header">

      <!-- Icona decorativa -->
      <div class="header-icon">
        <i class="fa-solid fa-route"></i>
      </div>

      <!-- Titolo pagina -->
      <h1>Evacuation Planning</h1>

      <!-- Separatore grafico -->
      <div class="divider"></div>

      <!-- Descrizione -->
      <p>

        Enter your current node.
        The system will calculate the safest evacuation route.

      </p>

    </div>


    <!-- ================= FORM ================= -->
    <!-- ================= FORM ================= -->
<div class="form-section">

  <!-- BUILDING -->
  <div class="form-group">

    <label>Building</label>

   <select
    class="form-control"
    [(ngModel)]="selectedBuilding"
    (change)="updateFloors(); updateNodes()">

    <option value="">Select building</option>
    <option value="A">Building A</option>
    <option value="B">Building B</option>
    <option value="D">Building D</option>

  </select>

  </div>


  <!-- FLOOR -->
  <div class="form-group">

    <label>Floor</label>

    <select
      class="form-control"
      [(ngModel)]="selectedFloor"
      (change)="updateNodes()">

      <option value="">Select floor</option>

      <option *ngFor="let floor of floors" [value]="floor.value">
        {{ floor.label }}
      </option>

    </select>

  </div>


  <!-- START NODE -->
  <div class="form-group">

    <label for="startNode">Starting Node</label>

    <select
      id="startNode"
      class="form-control"
      [(ngModel)]="startNode">

      <option value="">Select your location</option>

      <option *ngFor="let node of nodes" [value]="node.id">
        {{ node.label }}
      </option>

    </select>

  </div>


  <!-- BUTTON -->
  <button
    class="btn-submit"
    (click)="calculate()"
    [disabled]="loading || !startNode">

    <span *ngIf="!loading">
      Calculate Route
    </span>

    <span *ngIf="loading" class="spinner"></span>

  </button>

</div>

</div>
